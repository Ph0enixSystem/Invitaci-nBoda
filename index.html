        /* Eliminar la capa de sombra/overlay del carrusel */
        .carousel-caption {

        .carousel-item img {

            height: 100vh;
            min-height: 700px;
            background-color: #000;
        }
        
        /* Contenedor del carrusel sin márgenes ni rellenos adicionales */
        #header-carousel,

            margin-bottom: 0 !important;
            padding-bottom: 0 !important;
        }
        
        /* Eliminar espacio sobrante del body */

            padding: 0;
            overflow-x: hidden;
        }
        
        /* Ocultar la flecha scroll-to-bottom */
        .scroll-to-bottom {
            display: none !important;
        }
        
        /* Ajuste responsivo para móviles */
        @media (max-width: 768px) {
            .carousel-item {
                min-height: 500px;
            }
        }
        
        /* Ocultar botón de play después de hacer clic */
        .btn-play.hide-play {
            display: none !important;
        }
        
        /* Estilo para controles deshabilitados */
        .carousel-control-prev.disabled-control,
        .carousel-control-next.disabled-control {
            pointer-events: none;
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Botones personalizados (Ubicación y Confirma aquí) */
        .custom-action-btn {
            display: inline-block;
            background-color: #000;

            border: 2px solid #fff;

            padding: 12px 30px;

            letter-spacing: 1px;
            touch-action: manipulation; /* Mejora respuesta táctil */
        }
        
        .custom-action-btn:hover {
            background-color: #E47A2E;
            border-color: #E47A2E;
            color: #fff;
            transform: scale(1.05);
        }
        
        /* Contenedor para alinear a la izquierda en la diapositiva de ubicación */

            text-align: left;
            padding-left: 5%;
            margin-top: 50vh;

        /* Ajuste para que los botones no se superpongan al botón de play */
        .carousel-caption .p-3 {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        
        .left-aligned .custom-action-btn {
            margin-left: 0;
        }
        
        /* Mejora el botón de play para móviles */
        .btn-play {
            touch-action: manipulation;
            z-index: 100;
            position: relative;
        }
        
        @media (max-width: 768px) {
            .left-aligned {

    <!-- Script personalizado (sin bloqueo táctil problemático) -->
    <script>
        (function() {
            let audioPlayer = null;
            let musicStarted = false;
            let carouselUnlocked = false;
            
            const SONG_PATH = 'img/cancion.mp3';
            
            const $carousel = $('#header-carousel');
            const $prevBtn = $('#carousel-prev');
            const $nextBtn = $('#carousel-next');
            
            // Deshabilitar controles (prev/next) pero sin bloquear eventos táctiles en todo el carrusel
            function disableCarouselControls() {
                $prevBtn.off('click.carouselLock');
                $nextBtn.off('click.carouselLock');
                $prevBtn.addClass('disabled-control');
                $nextBtn.addClass('disabled-control');
                $prevBtn.on('click.carouselLock', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                });
                $nextBtn.on('click.carouselLock', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                });
                // Bloquear teclado
                $(document).off('keydown.carouselLock').on('keydown.carouselLock', function(e) {
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                        e.preventDefault();
                    }
                });
                // NO bloqueamos touchstart/touchmove en el carrusel para permitir que los botones funcionen
            }
            
            function enableCarouselControls() {
                $prevBtn.off('click.carouselLock');
                $nextBtn.off('click.carouselLock');
                $prevBtn.removeClass('disabled-control');
                $nextBtn.removeClass('disabled-control');
                $prevBtn.off('click').on('click', function(e) {
                    $carousel.carousel('prev');
                    e.preventDefault();
                });
                $nextBtn.off('click').on('click', function(e) {
                    $carousel.carousel('next');
                    e.preventDefault();
                });
                $(document).off('keydown.carouselLock');
            }
            
            // Inicializar carrusel sin autoavance
            $carousel.carousel({
                interval: false,
                ride: false,
                pause: true
            });
            
            disableCarouselControls();
            
            const playButtons = document.querySelectorAll('.play-music-btn');
            
            function hideAllPlayButtons() {
                playButtons.forEach(btn => {
                    btn.classList.add('hide-play');
                    btn.style.display = 'none';
                });
            }
            
            function startMusic() {
                if (musicStarted) return;
                try {
                    audioPlayer = new Audio(SONG_PATH);
                    audioPlayer.play().then(() => {
                        musicStarted = true;
                        console.log('Música reproduciéndose');
                    }).catch(error => {
                        console.error('Error al reproducir música:', error);
                        alert('No se pudo reproducir la canción. Asegúrate de que el archivo "' + SONG_PATH + '" exista en la carpeta img.');
                    });
                } catch (error) {
                    console.error('Error al crear Audio:', error);
                    alert('Error al cargar el reproductor de música.');
                }
            }
            
            function unlockCarousel() {
                if (carouselUnlocked) return;
                carouselUnlocked = true;
                enableCarouselControls();
                console.log('Carrusel desbloqueado');
            }
            
            function onPlayClick(event) {
                event.stopPropagation();
                hideAllPlayButtons();
                if (!musicStarted) startMusic();
                unlockCarousel();
            }
            
            // Asegurar que el evento click/touch funciona en móviles
            playButtons.forEach(btn => {
                btn.addEventListener('click', onPlayClick);
                btn.addEventListener('touchstart', onPlayClick); // Para mayor compatibilidad táctil
            });
            
            function adjustCarouselImages() {
                const images = document.querySelectorAll('#header-carousel .carousel-item img');
                images.forEach(img => {
                    img.style.objectFit = 'contain';
                });
            }
            
            window.addEventListener('load', adjustCarouselImages);
            window.addEventListener('resize', adjustCarouselImages);
        })();
    </script>
